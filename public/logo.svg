<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AA2FF"/>
      <stop offset="50%" stop-color="#C9A6FF"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7AA2FF"/>
      <stop offset="50%" stop-color="#C9A6FF"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
  </defs>

  <!-- Icon mark background -->
  <rect x="0" y="0" width="60" height="60" rx="12" fill="#0B0F1A"/>
  <rect x="0" y="0" width="60" height="60" rx="12" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.6"/>

  <!-- N letterform inside mark -->
  <line x1="17" y1="18" x2="17" y2="42" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="43" y1="18" x2="43" y2="42" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="17" y1="18" x2="43" y2="42" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="30" cy="50" r="2" fill="url(#gh)" opacity="0.8"/>

  <!-- Separator -->
  <line x1="74" y1="14" x2="74" y2="46" stroke="#ffffff" stroke-width="0.75" opacity="0.1"/>

  <!-- Name -->
  <text x="84" y="28" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#ffffff" opacity="0.95" letter-spacing="0.5">nikhil sahani</text>

  <!-- Gradient underline -->
  <rect x="84" y="32" width="118" height="1.5" rx="1" fill="url(#gh)" opacity="0.45"/>

  <!-- Sub-label -->
  <text x="84" y="45" font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#7AA2FF" opacity="0.55" letter-spacing="2.5">DEVELOPER</text>
</svg>
