<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AA2FF"/>
      <stop offset="50%" stop-color="#C9A6FF"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7AA2FF"/>
      <stop offset="50%" stop-color="#C9A6FF"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0B0F1A"/>

  <!-- Gradient border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.65"/>

  <!-- N letterform — left vertical -->
  <line x1="28" y1="30" x2="28" y2="70" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- N letterform — right vertical -->
  <line x1="72" y1="30" x2="72" y2="70" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- N letterform — diagonal stroke (gradient accent) -->
  <line x1="28" y1="30" x2="72" y2="70" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>

  <!-- Brand dot -->
  <circle cx="50" cy="82" r="3" fill="url(#gh)" opacity="0.85"/>
</svg>
